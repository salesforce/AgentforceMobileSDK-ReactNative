name: ReactAgentforce
options:
  bundleIdPrefix: com.salesforce.android.reactagentforce
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  ENABLE_BITCODE: NO
  ONLY_ACTIVE_ARCH: NO
  CLANG_ENABLE_OBJC_WEAK: YES
  CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: NO

targetTemplates:
  AgentforceApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Automatic
      ENABLE_BITCODE: NO
      OTHER_LDFLAGS: "$(inherited) -ObjC -lc++"
      HEADER_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../node_modules/react-native/React/** $(SRCROOT)/../node_modules/react-native/ReactCommon/**"
      LIBRARY_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../node_modules/react-native/ReactCommon/**"
    preBuildScripts:
      - name: "Start Packager"
        script: |
          export RCT_METRO_PORT="${RCT_METRO_PORT:=8081}"
          echo "export RCT_METRO_PORT=${RCT_METRO_PORT}" > "${SRCROOT}/../node_modules/react-native/scripts/.packager.env"
          if [ -z "${RCT_NO_LAUNCH_PACKAGER+xxx}" ] ; then
            if nc -w 5 -z localhost ${RCT_METRO_PORT} ; then
              if ! curl -s "http://localhost:${RCT_METRO_PORT}/status" | grep -q "packager-status:running" ; then
                echo "Port ${RCT_METRO_PORT} already in use, packager is either not running or not running correctly"
                exit 2
              fi
            else
              open "$SRCROOT/../node_modules/react-native/scripts/launchPackager.command" || echo "Can't start packager automatically"
            fi
          fi
        shell: /bin/sh
        showEnvVars: false
      - name: "Bundle React Native code and images"
        script: |
          set -e
          WITH_ENVIRONMENT="../node_modules/react-native/scripts/xcode/with-environment.sh"
          REACT_NATIVE_XCODE="../node_modules/react-native/scripts/react-native-xcode.sh"
          /bin/sh -c "$WITH_ENVIRONMENT $REACT_NATIVE_XCODE"
        shell: /bin/sh
        showEnvVars: false

schemes:
  ServiceAgent:
    build:
      targets:
        ServiceAgent: all
    run:
      config: Debug
    archive:
      config: Release
    shared: true

  EmployeeAgent:
    build:
      targets:
        EmployeeAgent: all
    run:
      config: Debug
    archive:
      config: Release
    shared: true

targets:
  ServiceAgent:
    templates:
      - AgentforceApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.salesforce.android.reactagentforce.service
      PRODUCT_NAME: ServiceAgent
      INFOPLIST_FILE: ServiceAgent/Info.plist
      CODE_SIGN_ENTITLEMENTS: ServiceAgent/ServiceAgent.entitlements
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    sources:
      - path: Shared
        type: group
      - path: ServiceAgent
        type: group

  EmployeeAgent:
    templates:
      - AgentforceApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.salesforce.android.reactagentforce.employee
      PRODUCT_NAME: EmployeeAgent
      INFOPLIST_FILE: EmployeeAgent/Info.plist
      CODE_SIGN_ENTITLEMENTS: EmployeeAgent/EmployeeAgent.entitlements
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    sources:
      - path: Shared
        type: group
        excludes:
          - "AppDelegate.m"
      - path: EmployeeAgent
        type: group
