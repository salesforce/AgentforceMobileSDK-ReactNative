name: ReactAgentforce
options:
  bundleIdPrefix: com.salesforce.reactagentforce
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true

# Align with main-branch project.pbxproj (single-app reference)
# https://github.com/salesforce/AgentforceMobileSDK-ReactNative/blob/main/ios/ReactAgentforce.xcodeproj/project.pbxproj
settings:
  ENABLE_BITCODE: NO
  CLANG_ENABLE_OBJC_WEAK: YES
  CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: NO
  CLANG_ENABLE_MODULES: YES
  CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES: YES
  GCC_PRECOMPILE_PREFIX_HEADER: NO
  "EXCLUDED_ARCHS[sdk=iphonesimulator*]": i386
  configs:
    Debug:
      ONLY_ACTIVE_ARCH: YES
    Release:
      ONLY_ACTIVE_ARCH: NO

targetTemplates:
  AgentforceApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Manual
      ENABLE_BITCODE: NO
      OTHER_LDFLAGS: "$(inherited) -ObjC -lc++"
      LIBRARY_SEARCH_PATHS: "$(inherited)"
      HEADER_SEARCH_PATHS:
        - "$(inherited)"
        - "$(SRCROOT)/../node_modules/react-native/React/**"
      VERSIONING_SYSTEM: apple-generic
      configs:
        Debug:
          DEAD_CODE_STRIPPING: NO
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    preBuildScripts:
      - name: "Start Packager"
        script: |
          export RCT_METRO_PORT="${RCT_METRO_PORT:=8081}"
          echo "export RCT_METRO_PORT=${RCT_METRO_PORT}" > "${SRCROOT}/../node_modules/react-native/scripts/.packager.env"
          if [ -z "${RCT_NO_LAUNCH_PACKAGER+xxx}" ] ; then
            if nc -w 5 -z localhost ${RCT_METRO_PORT} ; then
              if ! curl -s "http://localhost:${RCT_METRO_PORT}/status" | grep -q "packager-status:running" ; then
                echo "Port ${RCT_METRO_PORT} already in use, packager is either not running or not running correctly"
                exit 2
              fi
            else
              open "$SRCROOT/../node_modules/react-native/scripts/launchPackager.command" || echo "Can't start packager automatically"
            fi
          fi
        shell: /bin/sh
        showEnvVars: false
      - name: "Generate AppConfig from Target"
        script: |
          set -e
          cd "${SRCROOT}/.."

          # Detect target: ServiceAgent or EmployeeAgent
          if [ "$TARGET_NAME" = "ServiceAgent" ]; then
            APP_MODE="service"
          elif [ "$TARGET_NAME" = "EmployeeAgent" ]; then
            APP_MODE="employee"
          else
            echo "warning: Unknown target $TARGET_NAME, defaulting to 'all'"
            APP_MODE="all"
          fi

          echo "🎯 Auto-detected target: $TARGET_NAME → APP_MODE=$APP_MODE"
          node scripts/generate-app-config.js "$APP_MODE"
        shell: /bin/sh
        showEnvVars: false
      - name: "Bundle React Native code and images"
        script: |
          set -e
          WITH_ENVIRONMENT="../node_modules/react-native/scripts/xcode/with-environment.sh"
          REACT_NATIVE_XCODE="../node_modules/react-native/scripts/react-native-xcode.sh"
          /bin/sh -c "$WITH_ENVIRONMENT $REACT_NATIVE_XCODE"
        shell: /bin/sh
        showEnvVars: false

schemes:
  ServiceAgent:
    build:
      targets:
        ServiceAgent: all
    run:
      config: Debug
    archive:
      config: Release
    shared: true

  EmployeeAgent:
    build:
      targets:
        EmployeeAgent: all
    run:
      config: Debug
    archive:
      config: Release
    shared: true

targets:
  ServiceAgent:
    templates:
      - AgentforceApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.salesforce.reactagentforce.service
      PRODUCT_NAME: ServiceAgent
      INFOPLIST_FILE: ServiceAgent/Info.plist
      CODE_SIGN_ENTITLEMENTS: ServiceAgent/ServiceAgent.entitlements
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    sources:
      - path: Shared
        type: group
      - path: ServiceAgent
        type: group

  EmployeeAgent:
    templates:
      - AgentforceApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.salesforce.reactagentforce.employee
      PRODUCT_NAME: EmployeeAgent
      INFOPLIST_FILE: EmployeeAgent/Info.plist
      CODE_SIGN_ENTITLEMENTS: EmployeeAgent/EmployeeAgent.entitlements
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    sources:
      - path: Shared
        type: group
        excludes:
          - "AppDelegate.m"
      - path: EmployeeAgent
        type: group
